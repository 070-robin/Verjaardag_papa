<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gefeliciteerd Pap!</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
text-align:center;
overflow-x:hidden;
overflow-y:auto;
padding:20px;
}

.card{
background:rgba(255,255,255,0.12);
padding:40px;
border-radius:20px;
max-width:700px;
width:100%;
backdrop-filter: blur(10px);
box-shadow:0 20px 60px rgba(0,0,0,0.5);
animation: glow 4s infinite alternate;
}

@keyframes glow{
from{box-shadow:0 20px 60px rgba(0,0,0,0.4);}
to{box-shadow:0 20px 80px rgba(0,255,200,0.3);}
}

img{
width:100%;
max-width:450px;
height:auto;
border-radius:15px;
margin:25px auto;
display:block;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

button{
padding:15px 28px;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
background:#ffcc00;
font-weight:bold;
}

button:hover{
transform:scale(1.05);
}

a{
display:inline-block;
margin-top:20px;
padding:14px 25px;
background:#00d084;
color:white;
text-decoration:none;
border-radius:12px;
font-weight:bold;
}

.hidden{
display:none;
}

.champagne{
position:fixed;
font-size:60px;
top:40%;
transform:translateY(-50%);
opacity:0;
}

.left{
left:20px;
}

.right{
right:20px;
}

.pop{
animation:pop 1s forwards;
}

@keyframes pop{
0%{transform:translateY(-50%) scale(0); opacity:0;}
60%{transform:translateY(-50%) scale(1.4);}
100%{transform:translateY(-50%) scale(1); opacity:1;}
}

/* mobiel optimalisatie */

@media (max-width:600px){

.card{
padding:25px;
}

h1{
font-size:26px;
}

h2{
font-size:20px;
}

button{
font-size:16px;
}

.champagne{
font-size:40px;
}

}

</style>
</head>

<body>

<div class="champagne left">🍾</div>
<div class="champagne right">🍾</div>

<div class="card">

<div id="intro">

<h1>📩 Je hebt een bericht</h1>
<p>Van Robin</p>

<button onclick="openMessage()">Open bericht</button>

</div>

<div id="message" class="hidden">

<h1>🎉 Gefeliciteerd Pap! 🎉</h1>
<h2>54 jaar vandaag</h2>

<p>Bedankt voor alles wat je altijd voor ons doet.</p>

<img src="familie.jpg?v=5">

<h2>🌅 Cadeau: Diner voor Twee</h2>

<p>
Voor jou en mam heb ik een diner voor twee geregeld.<br>
Lekker samen eten aan het strand ❤️
</p>

<a href="https://fftijd.nl/menukaart/" target="_blank">
Bekijk het menu 🍽️
</a>

<p style="margin-top:30px">
Veel liefs,<br>
Robin
</p>

</div>

</div>

<script>

function megaConfetti(){

for(let i=0;i<5;i++){

confetti({
particleCount:200,
spread:120,
origin:{x:Math.random(),y:Math.random()-0.2}
})

}

}

function fireworks(){

for(let i=0;i<8;i++){

setTimeout(function(){

confetti({
particleCount:300,
spread:200,
startVelocity:60,
origin:{x:0.5,y:0.6}
})

}, i*300)

}

}

function openMessage(){

document.getElementById("intro").style.display="none";
document.getElementById("message").style.display="block";

document.querySelector(".left").classList.add("pop")
document.querySelector(".right").classList.add("pop")

megaConfetti()

fireworks()

}

</script>

</body>
</html>
