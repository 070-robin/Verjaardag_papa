<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gefeliciteerd Pap!</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
text-align:center;
}

.card{
background:rgba(255,255,255,0.1);
padding:40px;
border-radius:20px;
max-width:700px;
}

img{
width:100%;
max-width:500px;
border-radius:15px;
margin:20px 0;
}

button{
padding:15px 25px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
background:#ffcc00;
}

a{
display:inline-block;
margin-top:15px;
padding:12px 20px;
background:#00d084;
color:white;
text-decoration:none;
border-radius:10px;
font-weight:bold;
}

.hidden{
display:none;
}
</style>
</head>

<body>

<div class="card">

<div id="intro">
<h1>📩 Je hebt een bericht</h1>
<p>Van Robin</p>
<button onclick="openMessage()">Open bericht</button>
</div>

<div id="message" class="hidden">
<h1>🎉 Gefeliciteerd Pap! 🎉</h1>
<h2>54 jaar vandaag</h2>

<p>Bedankt voor alles wat je altijd voor ons doet.</p>

<img src="familie.jpg">

<h2>🌅 Cadeau: Diner voor Twee</h2>

<p>
Voor jou en mam heb ik een diner voor twee geregeld.<br>
Lekker samen eten aan het strand ❤️
</p>

<a href="https://www.google.com/search?q=strandrestaurant+hoek+van+holland" target="_blank">
Bekijk jullie diner 🍽️
</a>

<p style="margin-top:25px">
Veel liefs,<br>
Robin
</p>
</div>

</div>

<script>
function openMessage(){
document.getElementById("intro").style.display="none";
document.getElementById("message").style.display="block";
confetti({particleCount:200,spread:120,origin:{y:0.6}});
}
</script>

</body>
</html>
